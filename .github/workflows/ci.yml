name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tsx (TypeScript runner)
        run: npm install -g tsx

      - name: Validate LICENSE
        run: |
          test -f LICENSE
          grep -q 'MIT License' LICENSE
          echo 'LICENSE: valid ✓'

      - name: Validate README
        run: |
          test -f README.md
          grep -q 'Capitaine' README.md
          grep -q 'Quick Start' README.md
          echo 'README: valid ✓'

      - name: Validate worker.ts exists
        run: |
          test -f src/worker.ts
          echo 'worker.ts: present ✓'

      - name: Validate lib modules
        run: |
          for mod in crystal dead-reckoning discovery forgiveness learning trust; do
            test -f "lib/${mod}.ts"
          done
          echo 'All 6 lib modules: present ✓'

      - name: Validate .gitignore
        run: |
          test -f .gitignore
          grep -q 'node_modules' .gitignore
          grep -q '.wrangler' .gitignore
          echo '.gitignore: valid ✓'

      - name: Run module tests
        run: |
          chmod +x tests/run-all.sh
          ./tests/run-all.sh
